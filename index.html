<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>🌦 Weather App</h1>

    <!-- SEARCH SECTION -->
    <div class="search">
        <input id="searchInput" placeholder="Enter city">
        <button id="searchBtn">Search</button>
    </div>

    <!-- TOGGLE BUTTON (IMPORTANT) -->
    <div style="margin-top:10px;">
        <button id="toggleUnit">Switch °F/°C</button>
    </div>

    <!-- FAVORITES (SEPARATE BLOCK) -->
    <div class="favorites">
        <h3>⭐ Favorites</h3>
        <div id="favList"></div>
    </div>

    <h2 id="cityTitle"></h2>

    <div id="weatherBox"></div>
    <div id="forecastBox"></div>

    <!-- JS FILES -->
    <script src="js/config.js"></script>
    <script src="js/weatherService.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
